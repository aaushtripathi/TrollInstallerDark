name: Build TrollInstallerDark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew update
          brew install ldid

      - name: Build and Package IPA
        run: |
          set -e
          
          # 1. Build the application (compiled as TrollInstallerX.app)
          xcodebuild -configuration Release \
            -derivedDataPath DerivedData/TrollInstallerX \
            -destination 'generic/platform=iOS' \
            -scheme TrollInstallerX \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGN_IDENTITY=""
          
          # 2. Prepare packaging environment
          cp Resources/ents.plist DerivedData/TrollInstallerX/Build/Products/Release-iphoneos/
          pushd DerivedData/TrollInstallerX/Build/Products/Release-iphoneos
          
          rm -rf Payload TrollInstallerDark.ipa
          mkdir Payload
          cp -r TrollInstallerX.app Payload
          
          # 3. Pseudo-sign the app using ldid
          ldid -Sents.plist Payload/TrollInstallerX.app
          
          # 4. Zip into the new TrollInstallerDark.ipa name
          zip -qry TrollInstallerDark.ipa Payload
          popd
          
          # 5. Move the renamed IPA to root directory
          cp DerivedData/TrollInstallerX/Build/Products/Release-iphoneos/TrollInstallerDark.ipa .
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstallerDark-Release
          path: TrollInstallerDark.ipa
